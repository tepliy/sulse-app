name: VirusTotal Release Scan

on:
  release:
    types: [published, edited] # Trigger when a release is published or edited/updated
  workflow_dispatch:            # Allow manual triggering for any release
    inputs:
      tag_name:
        description: 'Release tag to scan (leave empty for the latest release)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    # Grant permissions to write/update release descriptions and commit changes
    permissions:
      contents: write

    steps:
      # 1. Checkout repository to allow updating README.md
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Determine target tag name and download DMG file attached to the release
      - name: Download release asset
        id: download_asset
        run: |
          # Determine tag name from event or fallback to latest
          TAG_NAME="${{ github.event.release.tag_name }}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          fi
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME=$(gh release view --json tagName --template '{{.tagName}}')
          fi
          
          echo "Target tag name: $TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Download the DMG file
          gh release download "$TAG_NAME" --pattern "*.dmg" --dir .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Upload and scan the downloaded DMG file with VirusTotal
      - name: VirusTotal Scan
        id: vt_scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          files: |
            *.dmg
          vt_api_key: ${{ secrets.VT_API_KEY }}

      # 4. Append or update the VirusTotal scan report link in the release description
      - name: Update Release Description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          TAG_NAME="${{ steps.download_asset.outputs.tag_name }}"
          
          # Get the analysis URL from the output (e.g., Sulse.dmg=https://...)
          ANALYSIS_URL=$(echo "${{ steps.vt_scan.outputs.analysis }}" | cut -d'=' -f2-)
          
          # Use the environment variable to avoid shell interpolation syntax errors
          CURRENT_BODY="$RELEASE_BODY"
          if [ -z "$CURRENT_BODY" ]; then
            CURRENT_BODY=$(gh release view "$TAG_NAME" --json body --template '{{.body}}')
          fi
          
          # Clean up any existing VirusTotal report block to prevent duplicates
          CLEANED_BODY=$(echo "$CURRENT_BODY" | perl -0777 -pe 's/\s*---\s*🛡️ \*\*Security Scan:\*\*.*//gs')
          
          # Format the new security scan report line using HTML to support opening in a new tab
          REPORT_LINE="---"$'\n'"🛡️ **Security Scan:** <a href=\"$ANALYSIS_URL\" target=\"_blank\">View VirusTotal report for this version</a>"
          
          # Append new report link to the cleaned body
          NEW_BODY="$CLEANED_BODY"$'\n\n'"$REPORT_LINE"
          
          # Update release via GitHub CLI
          gh release edit "$TAG_NAME" --notes "$NEW_BODY"

      # 5. Update the VirusTotal badge in README.md, commit, and push changes
      - name: Update README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the analysis URL from the output
          ANALYSIS_URL=$(echo "${{ steps.vt_scan.outputs.analysis }}" | cut -d'=' -f2-)
          
          # Define new badge content linking to the VirusTotal analysis report (exported to env for Perl)
          export NEW_BADGE="  <!-- virustotal-badge-start -->
  <a href=\"$ANALYSIS_URL\" target=\"_blank\">
    <img src=\"https://img.shields.io/badge/VirusTotal-Verified_Safe-brightgreen?style=flat-square&logo=virustotal\" alt=\"VirusTotal Status\">
  </a>
  <!-- virustotal-badge-end -->"
          
          # Replace the block in README.md using perl via ENV mapping (safe from delimiter collisions)
          perl -i -0777 -pe 's/<!-- virustotal-badge-start -->.*?<!-- virustotal-badge-end -->/$ENV{NEW_BADGE}/s' README.md
          
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to README.md
          if ! git diff --exit-code README.md; then
            git add README.md
            git commit -m "docs: update VirusTotal scan report link in README [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to README.md"
          fi
